<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Solicitud de Estudios CMC - Innova Med</title>
    <style>
    /* 1. RESET Y ESTILOS DE PANTALLA */
    .document-container * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body { 
        font-family: 'Times New Roman', Times, serif; 
        line-height: 1.2; 
        background-color: #f4f4f4; 
        padding: 20px;
        color: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .document-container {
        background-color: white;
        width: 816px; 
        min-height: 1056px; 
        margin: 20px auto; 
        padding: 50px 70px; 
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* 2. ENCABEZADO */
    .header-table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-bottom: 20px; 
    }

    .logo-cell { width: 40%; vertical-align: middle; }
    .logo-cell img { max-width: 260px; height: auto; display: block; }
    .info-cell { width: 60%; vertical-align: middle; text-align: center; }

    .top-info h2 { 
        font-family: Arial, sans-serif; 
        font-size: 16pt; 
        color: #666666; 
        letter-spacing: 1px;
    }

    .dra-name { 
        font-family: Arial, sans-serif; 
        font-size: 11pt; 
        color: #666666; 
        margin-top: 2px;
    }

    /* 3. CUERPO DEL DOCUMENTO */
    .date-row { text-align: right; margin-bottom: 15px; font-weight: bold; }
    .patient-data { margin-bottom: 30px; }
    .patient-data p { margin: 0 !important; line-height: 1.1; font-size: 11pt; }

    .doc-title { 
        text-align: center; 
        text-decoration: underline; 
        margin: 35px 0; 
        font-weight: bold; 
        font-size: 14pt;
    }

    .clinical-block { margin-bottom: 20px; }
    .clinical-block h3 { font-size: 11pt; font-weight: bold; margin-bottom: 4px; }
    .content-box { min-height: 20px; font-size: 11pt; border-bottom: 1px solid #eee; }

    footer { margin-top: 80px; text-align: center; }
    .signature-line { width: 200px; border-top: 1.5px solid #000; margin: 0 auto 5px; }

    /* 4. BOTONERA */
    .button-container { margin-top: 30px; display: flex; justify-content: center; gap: 15px; width: 100%; }
    .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 5px; font-family: Arial, sans-serif; font-weight: bold; transition: 0.3s; }
    .btn-print { background-color: #27649d; color: white; }
    .btn-word { background-color: #2b579a; color: white; }

    /* 5. CORRECCIÓN MARGEN DERECHO PDF (IMPRESIÓN) */
    @media print {
        @page { size: letter; margin: 0; }
        body { background-color: white; padding: 0; margin: 0; display: block; }
        .document-container { 
            width: 100% !important; 
            margin: 0 !important; 
            padding: 1.5cm 2cm !important; 
            box-shadow: none; 
        }
        .no-print { display: none !important; }
    }
    </style>
</head>
<body>
    <div id="exportContent" class="document-container">
        <table class="header-table">
            <tr>
                <td class="logo-cell">
                    <img src="https://lh3.googleusercontent.com/d/1AG-tPiSsSS3lK2I1X3qFj7iWVh0oC1bF" alt="Logo">
                </td>
                <td class="info-cell">
                    <div class="top-info">
                        <h2>DRA. LUISA MONTILLA</h2>
                        <p class="dra-name">Médico Dermatólogo UCV</p>
                    </div>
                </td>
            </tr>
        </table>

        <div class="date-row">Fecha: <span id="fecha"></span></div>

        <section class="patient-data">
            <p><strong>Nombre y Apellido:</strong> <span id="nombre"></span></p>
            <p><strong>C.I.:</strong> <span id="cedula"></span></p>
            <p><strong>Edad:</strong> <span id="edad"></span></p>
        </section>

        <main>
            <h1 class="doc-title">Solicitud de estudios de Radiodiagnóstico</h1>
            
            <div class="clinical-block">
                <h3>Información clínica:</h3>
                <div id="info-clinica" class="content-box"></div>
            </div>
            
            <div class="clinical-block">
                <h3>Diagnóstico clínico:</h3>
                <div id="diag-clinico" class="content-box"></div>
            </div>
            
            <div class="clinical-block">
                <h3>Estudio solicitado:</h3>
                <div id="estudio" class="content-box"></div>
            </div>
        </main>

        <footer>
            <div class="signature-line"></div>
            <p>Firma y Sello Médico</p>
        </footer>
    </div>

    <div class="button-container no-print">
        <button class="btn btn-print" onclick="window.print()">Imprimir PDF</button>
        <button class="btn btn-word" onclick="exportToWord()">Descargar Word</button>
    </div>

    <script>
        // Captura de datos de AppSheet
        const params = new URLSearchParams(window.location.search);
        document.getElementById('fecha').innerText = params.get('f') || '';
        document.getElementById('nombre').innerText = params.get('n') || '';
        document.getElementById('cedula').innerText = params.get('c') || '';
        document.getElementById('edad').innerText = params.get('e') || '';
        document.getElementById('info-clinica').innerText = params.get('ic') || '';
        document.getElementById('diag-clinico').innerText = params.get('dc') || '';
        document.getElementById('estudio').innerText = params.get('s') || '';

        function exportToWord() {
            var node = document.getElementById("exportContent");
            var clone = node.cloneNode(true);
            var content = clone.innerHTML;

            // Estilos específicos para inyectar en los tags del Word
            var pStyle = 'style="margin:0in; margin-bottom:.0001pt; line-height:1.1; font-family:\'Times New Roman\',serif; font-size:11pt; mso-line-height-rule:exactly;"';
            var headerStyle = 'style="margin:0in; margin-bottom:.0001pt; line-height:1.0; font-family:Arial,sans-serif; mso-line-height-rule:exactly;"';

            // Reemplazos para compatibilidad
            content = content.replace(/<img/g, '<img width="240" height="85"');
            content = content.replace(/<h2>/g, '<h2 ' + headerStyle + ' style="font-size:16pt; color:#666666;">');
            content = content.replace(/<p class="dra-name">/g, '<p ' + headerStyle + ' style="font-size:11pt; color:#666666;">');
            
            // Forzar pegado de datos del paciente
            content = content.replace(/<p><strong>Nombre/g, '<p ' + pStyle + '><strong>Nombre');
            content = content.replace(/<p><strong>C.I./g, '<p ' + pStyle + '><strong>C.I.');
            content = content.replace(/<p><strong>Edad/g, '<p ' + pStyle + '><strong>Edad');

            // Alineaciones
            content = content.replace(/class="date-row"/g, 'align="right" style="text-align:right; font-weight:bold;"');
            content = content.replace(/class="doc-title"/g, 'align="center" style="text-align:center; font-size:14pt; font-weight:bold; text-decoration:underline; margin:20pt 0;"');
            content = content.replace(/<footer>/g, '<footer align="center" style="text-align:center; margin-top:50pt;">');
            content = content.replace(/class="signature-line"/g, 'align="center" style="border-top:1pt solid black; width:150pt; margin:0 auto;"');

            var preHtml = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
                <meta charset='utf-8'>
                <!--[if gte mso 9]>
                <xml>
                    <w:WordDocument>
                        <w:View>Print</w:View>
                        <w:Zoom>100</w:Zoom>
                        <w:DoNotOptimizeForBrowser/>
                    </w:WordDocument>
                </xml>
                <![endif]-->
                <style>
                    @page Section1 { size: 8.5in 11in; margin: 0.5in 0.8in; }
                    div.Section1 { page: Section1; }
                    body { font-family: 'Times New Roman', serif; }
                </style>
            </head>
            <body><div class="Section1">${content}</div></body>
            </html>`;

            var blob = new Blob(['\ufeff', preHtml], { type: 'application/msword' });
            var url = URL.createObjectURL(blob);
            var filename = 'Solicitud_' + (document.getElementById('nombre').innerText || 'Paciente') + '.doc';
            
            var downloadLink = document.createElement("a");
            document.body.appendChild(downloadLink);
            downloadLink.href = url;
            downloadLink.download = filename;
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }
    </script>
</body>
</html>
