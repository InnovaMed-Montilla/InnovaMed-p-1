<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Tratamiento Cavendes - Innova Med</title>
    <style>
        /* Estilos Base Cavendes */
        body { font-family: 'Times New Roman', Times, serif; line-height: 1.1; background-color: #f4f4f4; padding: 20px; color: #000; display: flex; flex-direction: column; align-items: center; }
        .document-container { background-color: white; width: 816px; min-height: 1056px; margin: 20px auto; padding: 50px 70px; box-shadow: 0 0 10px rgba(0,0,0,0.1); box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* Encabezado Cavendes */
        .header-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; border: none; }
        .logo-cell { width: 35%; vertical-align: middle; }
        .logo-cell img { width: 100%; max-width: 280px; height: auto; display: block; }
        .info-cell { width: 65%; vertical-align: middle; text-align: center; }
        .top-info h2 { margin: 0; font-size: 0.9em; text-transform: uppercase; font-family: Arial, sans-serif; }
        .dra-name { margin: 2px 0; font-size: 0.9em; font-family: Arial, sans-serif; }
        .header-divider { border-top: 2.5pt solid #000; margin: 5px 0; width: 100%; }
        .bottom-info { font-size: 0.85em; line-height: 1.1; font-family: Arial, sans-serif; }

        /* Fila de Nombre y Fecha */
        .document-header-row { display: flex; justify-content: space-between; align-items: baseline; margin-top: 30px; margin-bottom: 20px; border-bottom: 1.5pt solid #000; padding-bottom: 5px; }
        .patient-title { font-size: 1.3em; font-weight: bold; text-transform: uppercase; }
        .date-label { font-size: 1.1em; font-weight: bold; }
        
        /* Contenido */
        .content-section { margin-top: 20px; flex-grow: 1; }
        .section-label { font-size: 1.1em; font-weight: bold; text-decoration: underline; margin-bottom: 15px; display: block; }
        .treatment-text { font-size: 12pt; text-align: left; line-height: 1.4; white-space: pre-wrap; }

        /* Botonera */
        .button-container { margin-top: 20px; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-print { background-color: #27649d; color: white; }
        .btn-word { background-color: #2b579a; color: white; }

        @media print { .no-print { display: none; } .document-container { box-shadow: none; margin: 0; padding: 40px; width: 100% !important; } }
    </style>
</head>
<body>
    <div id="exportContent" class="document-container">
        <table class="header-table">
            <tr>
                <td class="logo-cell">
                    <img src="https://lh3.googleusercontent.com/d/1b0xVc6U0mUzyTCTHS29LsfUf9yiV3Euk" alt="Logo">
                </td>
                <td class="info-cell">
                    <div class="top-info">
                        <h2>CONSULTORIO MÉDICO DERMATOLÓGICO</h2>
                        <p class="dra-name">Dra. Luisa Montilla - Dermatólogo UCV</p>
                    </div>
                    <div class="header-divider"></div>
                    <div class="bottom-info">
                        Torre Cavendes - Caracas. Teléfono: 0414-9172983<br>
                        Whatsapp: 04269198665 / @draluisamontilla
                    </div>
                </td>
            </tr>
        </table>

        <div class="document-header-row">
            <div class="patient-title"><span id="nombre"></span></div>
            <div class="date-label">Fecha: <span id="fecha"></span></div>
        </div>

        <main class="content-section">
            <span class="section-label">TRATAMIENTO / CONDUCTA:</span>
            <div id="tratamiento" class="treatment-text"></div>
        </main>
    </div>

    <div class="button-container no-print">
        <button class="btn btn-print" onclick="window.print()">Imprimir PDF</button>
        <button class="btn btn-word" onclick="exportToWord()">Descargar Word</button>
    </div>

    <script>
    // Función para formatear la fecha a dd/mm/aaaa
    function formatearFechaEspañol(fechaStr) {
        if (!fechaStr) return '';
        
        // Intentamos parsear la fecha. Se reemplaza '-' por '/' para evitar problemas de zona horaria local en JS
        const fechaObjeto = new Date(fechaStr.replace(/-/g, '\/'));
        
        // Si no es una fecha válida, devolvemos el texto original para no romper nada
        if (isNaN(fechaObjeto.getTime())) {
            return fechaStr;
        }

        const dia = String(fechaObjeto.getDate()).padStart(2, '0');
        const mes = String(fechaObjeto.getMonth() + 1).padStart(2, '0'); // Los meses van de 0 a 11
        const anio = fechaObjeto.getFullYear();

        return `${dia}/${mes}/${anio}`;
    }

    const params = new URLSearchParams(window.location.search);
    
    // Obtenemos la fecha del parámetro y la formateamos automáticamente
    const fechaOriginal = params.get('Fecha') || '';
    const fechaFormateada = formatearFechaEspañol(fechaOriginal);

    document.getElementById('fecha').innerText = fechaFormateada;
    document.getElementById('nombre').innerText = params.get('Nombre_Apellido') || '';
    document.getElementById('tratamiento').innerText = params.get('Tratamiento_Conducta') || '';

    function exportToWord() {
        var nombrePac = document.getElementById('nombre').innerText.trim() || 'Paciente';
        var fechaDoc = document.getElementById('fecha').innerText.trim() || '';
        var tratamientoContenido = document.getElementById('tratamiento').innerHTML;

        // Estructura de tabla blindada para Word con espacio extra
        var wordContent = `
            <table style="width:100%; border-collapse:collapse; border:none; mso-table-lspace:0pt; mso-line-height-rule:exactly;">
                <tr>
                    <td style="width:30%; vertical-align:middle; padding:0;">
                        <img src="https://lh3.googleusercontent.com/d/1b0xVc6U0mUzyTCTHS29LsfUf9yiV3Euk" width="160" height="80" style="display:block;">
                    </td>
                    <td style="width:70%; vertical-align:middle; text-align:center; padding:0;">
                        <div style="font-family:Arial, sans-serif; font-size:10pt; font-weight:bold; text-transform:uppercase; margin:0;">CONSULTORIO MÉDICO DERMATOLÓGICO</div>
                        <div style="font-family:Arial, sans-serif; font-size:10pt; margin:2pt 0;">Dra. Luisa Montilla - Dermatólogo UCV</div>
                        <div style="border-top:1.5pt solid black; margin:4pt 10pt;"></div>
                        <div style="font-family:Arial, sans-serif; font-size:8.5pt; color:#444444; line-height:1.1;">
                            Torre Cavendes - Caracas. Teléfono: 0414-9172983<br>
                            Whatsapp: 04269198665 / @draluisamontilla
                        </div>
                    </td>
                </tr>
            </table>

            <div style="margin-top:40pt; mso-para-margin-top:40pt;"> 
                <table style="width:100%; border-collapse:collapse; border:none;">
                    <tr>
                        <td style="text-align:left; vertical-align:bottom; border-bottom:1.5pt solid black; padding-top:30pt; padding-bottom:5pt;">
                            <span style="font-family:'Times New Roman', serif; font-size:14pt; font-weight:bold; text-transform:uppercase;">${nombrePac}</span>
                        </td>
                        <td style="text-align:right; vertical-align:bottom; border-bottom:1.5pt solid black; padding-top:30pt; padding-bottom:5pt;">
                            <span style="font-family:'Times New Roman', serif; font-size:11pt; font-weight:bold;">Fecha: ${fechaDoc}</span>
                        </td>
                    </tr>
                </table>
            </div>

            <div style="margin-top:25pt;">
                <p style="font-family:'Times New Roman', serif; font-size:11pt; font-weight:bold; text-decoration:underline; margin-bottom:12pt;">
                    TRATAMIENTO / CONDUCTA:
                </p>
                <div style="font-family:'Times New Roman', serif; font-size:11pt; text-align:left; line-height:1.4;">
                    ${tratamientoContenido.replace(/\n/g, '<br>')}
                </div>
            </div>
        `;

        var preHtml = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head>
            <meta charset='utf-8'>
             <style>
                @page Section1 { size: 8.5in 11in; margin: 0.5in 0.8in; }
                div.Section1 { page: Section1; }
                body { font-family: 'Times New Roman', serif; }
            </style>
        </head>
        <body>
            <div class="Section1">${wordContent}</div>
        </body>
        </html>`;

        var blob = new Blob(['\ufeff', preHtml], { type: 'application/msword' });
        var url = URL.createObjectURL(blob);
        var filename = 'Tratamiento_' + nombrePac.replace(/[^a-z0-9]/gi, '_') + '.doc';

        var downloadLink = document.createElement("a");
        document.body.appendChild(downloadLink);
        downloadLink.href = url;
        downloadLink.download = filename;
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
    </script>
</body>
</html>
